<!DOCTYPE html>
<html>
<head>
<title>Simple To Do List</title>

<style>

body{
    font-family: Arial;
    text-align:center;
}

#box{
    width:300px;
    margin:auto;
    padding:20px;
    border:2px solid black;
    background: linear-gradient(to top right, purple, white);
}

input{
    padding:5px;
}

button{
    padding:5px 10px;
}

li{
    margin:8px;
}

</style>

</head>

<body>

<div id="box">

<h2>My To Do List</h2>

<input type="text" id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

    let input = document.getElementById("taskInput");
    let task = input.value;

    if(task === ""){
        return;
    }

    let li = document.createElement("li");
    li.innerText = task;

    let btn = document.createElement("button");
    btn.innerText = "Delete";

    btn.onclick = function(){
        li.remove();
    };

    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

</script>

</body>
</html>
